{% extends 'tasks/base.html' %}
{% block title %}Delete Note{% endblock %}
{% block page_title %}Delete Note{% endblock %}
{% block content %}
<section class="card">
    <h2 style="margin-top:0;">Delete Note</h2>
    <p>Are you sure you want to delete this note?</p>
    <blockquote style="background:#f9fafb; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin:10px 0;">
        {{ note.content }}
    </blockquote>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button class="btn danger" type="submit">Yes, delete</button>
            <a class="btn secondary" href="{% url 'tasks:task_detail' note.task.pk %}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
