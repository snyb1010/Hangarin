<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hangarin{% endblock %}</title>
    <style>
        :root {
            --bg: #f8f7f4;
            --paper: #ffffff;
            --ink: #1f2937;
            --muted: #6b7280;
            --line: #d1d5db;
            --accent: #0f766e;
            --accent-2: #134e4a;
            --danger: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 42%);
        }
        .wrap { max-width: 1040px; margin: 0 auto; padding: 24px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }
        .brand { margin: 0; font-size: 28px; letter-spacing: .3px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            text-decoration: none;
            display: inline-block;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn.secondary { background: #fff; color: var(--accent); }
        .btn.danger { background: var(--danger); border-color: var(--danger); }
        .card {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .stat {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fdfdfd;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .stat strong {
            font-size: 22px;
            color: var(--accent-2);
            line-height: 1;
        }
        .muted { color: var(--muted); }
        input, select, textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            font: inherit;
            background: #fff;
        }
        textarea { min-height: 110px; }
        .field { margin-bottom: 14px; }
        .field label { display: block; margin-bottom: 6px; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
        .status {
            font-size: 12px;
            display: inline-block;
            border-radius: 999px;
            border: 1px solid var(--line);
            padding: 3px 10px;
            background: #f9fafb;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; border-bottom: 1px solid var(--line); padding: 10px 8px; vertical-align: top; }
        @media (max-width: 760px) {
            .grid { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .topbar { align-items: flex-start; flex-direction: column; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <header class="topbar">
            <h1 class="brand"><a href="{% url 'tasks:home' %}" style="text-decoration:none;color:inherit;">Hangarin</a></h1>
            <div class="actions">
                <a class="btn secondary" href="/admin/">Admin</a>
                <a class="btn" href="{% url 'tasks:task_create' %}">+ New Task</a>
            </div>
        </header>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
